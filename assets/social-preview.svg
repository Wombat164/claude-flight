<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="claude-flight">
  <title>claude-flight</title>
  <rect width="1280" height="640" fill="#0d1117"/>
  <!-- logo: instrument horizon + prompt cursor -->
  <g transform="translate(150 200) scale(3.75)" stroke="#58a6ff" fill="#58a6ff">
    <circle cx="32" cy="32" r="26" fill="none" stroke-width="4"/>
    <line x1="9" y1="32" x2="55" y2="32" stroke-width="3" stroke-linecap="round"/>
    <path d="M27 23 L41 32 L27 41 Z" stroke="none"/>
  </g>
  <!-- wordmark + tagline -->
  <text x="470" y="285" font-family="monospace" font-size="86" font-weight="bold" fill="#e6edf3">claude-flight</text>
